services:
  - type: web
    name: titanic-mlops
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: |
      pip install -r requirements.txt
      cd frontend
      npm ci
      npm run build
    startCommand: gunicorn mlops.app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: MLOPS_DEBUG
        value: "false"
      - key: MLOPS_MONITORING_MAX_LATENCY_POINTS
        value: "5000"
      - key: MLOPS_MONITORING_MAX_PREDICTION_POINTS
        value: "5000"
      - key: MLOPS_MONITORING_MAX_FEATURE_SNAPSHOTS
        value: "2000"
      - key: MLOPS_MONITORING_MAX_ALERTS
        value: "1000"
